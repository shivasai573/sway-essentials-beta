# configs/environment.d/wayland.conf
# Wayland-native environment variables for the systemd user session.
# Installed by Sway Essentials to ~/.config/environment.d/wayland.conf
# Loaded automatically by systemd --user on login (Fedora / SDDM / GDM).
# For TTY launches (exec sway in .bash_profile), source this file or add
# the variables there directly.

# Firefox: force Wayland (already set system-wide on Fedora 38+, kept for clarity)
MOZ_ENABLE_WAYLAND=1

# Qt 5/6: prefer the native Wayland backend, fall back to XCB if unavailable
QT_QPA_PLATFORM=wayland;xcb

# Qt Wayland: let the compositor draw window decorations (Sway does this)
QT_WAYLAND_DISABLE_WINDOWDECORATION=1

# SDL2 / SDL3: use Wayland video driver
SDL_VIDEODRIVER=wayland

# Clutter (GNOME): use Wayland backend
CLUTTER_BACKEND=wayland

# Electron apps (VS Code, etc.): auto-detect Ozone platform
ELECTRON_OZONE_PLATFORM_HINT=auto

# XDG session type (should be set by the login manager; belt-and-suspenders)
XDG_SESSION_TYPE=wayland

# XDG current desktop — needed by dbus-update-activation-environment in sway config
XDG_CURRENT_DESKTOP=sway
