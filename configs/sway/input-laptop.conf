# configs/sway/input-laptop.conf
# Laptop-specific input configuration.
# Included by the installer when laptop hardware is detected.
# Idempotency marker: # sway-essentials: laptop-input

input type:touchpad {
    tap enabled
    natural_scroll enabled
    dwt enabled           # disable-while-typing
    middle_emulation enabled
    accel_profile adaptive
    pointer_accel 0.2
}

input type:keyboard {
    xkb_options caps:escape
}
